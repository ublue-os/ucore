name: testing
on:
  merge_group:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "55 2 * * *" # 2:55am-ish UTC everyday (approx 50 minutes after akmods images run)
  workflow_dispatch:
    inputs:
      force_build:
        description: "Bypass RPM-only sentinel package-diff gate for non-RPM changes"
        default: true
        required: false
        type: boolean

jobs:
  build-testing:
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      ucore_stream: testing
      arch: "['aarch64','x86_64']"
      force_build: ${{ github.event_name == 'workflow_dispatch' && inputs.force_build || false }}
